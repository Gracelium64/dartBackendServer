name: shadow_app_backend
description: >
  A Dart backend learning server for Flutter developers.
  Provides authentication, CRUD operations, media storage, and admin tooling.
version: 0.1.0
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  # HTTP Server Framework
  shelf: ^1.4.0
  shelf_router: ^1.1.0
  shelf_cors_headers: ^0.1.3

  # Database
  sqlite3: ^2.1.0
  path: ^1.8.3

  # JSON Serialization
  json_serializable: ^6.6.0
  built_value: ^8.8.0

  # Authentication & Security
  jaguar_jwt: ^3.0.0
  pointycastle: ^3.8.0
  crypto: ^3.0.0

  # Email Services
  mailer: ^6.1.1

  # CLI & Terminal UI
  args: ^2.4.0
  cli_table: ^1.0.2
  ansicolor: ^2.0.1

  # Media & Compression
  archive: ^3.4.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  logging: ^1.2.0
  yaml: ^3.1.0

dev_dependencies:
  test: ^1.24.0
  build_runner: ^2.4.0
  lints: ^2.1.0

dependency_overrides:
